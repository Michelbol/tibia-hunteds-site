services:
  world-scraper:
    build:
      context: ./php
    image: michelbolzon/tibia-scrapper-scheduler:latest
    volumes:
      - ./../../src:/var/www/html
    command: >
      sh -c "while true; do php artisan world-scraper >> /dev/null 2>&1; sleep 5; done"
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION}
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=${REVERB_HOST}
      - REVERB_PORT=${REVERB_PORT}
      - REVERB_SCHEME=${REVERB_SCHEME}
    networks:
      - laravel
    restart: always
networks:
  laravel:
    driver: bridge